<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --card: #ffffff;
            --text: #17324d;
            --muted: #66788a;
            --primary: #0b6efd;
            --primary-dark: #084298;
            --border: #d9e2ec;
            --shadow: 0 16px 40px rgba(17, 24, 39, 0.10);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top right, rgba(11, 110, 253, 0.12), transparent 32%),
                linear-gradient(180deg, #eef5ff 0%, var(--bg) 100%);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(100%, 760px);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 32px;
        }

        .eyebrow {
            color: var(--primary);
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin: 0 0 10px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(1.9rem, 3vw, 3rem);
            line-height: 1.1;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
        }

        .search-box {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            margin-top: 28px;
        }

        input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 18px;
            font-size: 1rem;
            color: var(--text);
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(11, 110, 253, 0.12);
        }

        button,
        .link-button {
            border: 0;
            border-radius: 14px;
            padding: 16px 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        button:hover,
        .link-button:hover {
            transform: translateY(-1px);
        }

        .primary {
            background: var(--primary);
            color: #fff;
        }

        .primary:hover {
            background: var(--primary-dark);
        }

        .secondary {
            background: #eaf2ff;
            color: var(--primary-dark);
        }

        .result,
        .empty {
            margin-top: 24px;
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 20px;
            background: #fbfdff;
        }

        .hidden {
            display: none;
        }

        .service-no {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .coords {
            font-family: Consolas, monospace;
            color: var(--muted);
            margin-bottom: 18px;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .status {
            margin-top: 18px;
            min-height: 24px;
            color: var(--muted);
            font-weight: 500;
        }

        .list {
            margin-top: 18px;
            display: grid;
            gap: 12px;
        }

        .list-item {
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            background: #fff;
        }

        .list-item strong {
            display: block;
            margin-bottom: 6px;
        }

        .list-item button {
            margin-top: 12px;
            padding: 12px 16px;
        }

        @media (max-width: 640px) {
            .card {
                padding: 24px;
            }

            .search-box {
                grid-template-columns: 1fr;
            }

            button,
            .link-button {
                width: 100%;
            }

            .actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <p class="eyebrow">Torrent Power</p>
        <h1>ATLAS</h1>
        <p>Enter a service number to find location.</p>

        <div class="search-box">
            <input
                type="text"
                id="search"
                placeholder="Enter service number"
                autocomplete="off"
                inputmode="numeric"
            >
            <button class="primary" id="searchButton" type="button">Search</button>
        </div>

        <div class="status" id="status"></div>

        <section class="result hidden" id="resultCard">
            <div class="service-no" id="serviceNo"></div>
            <div class="coords" id="coords"></div>
            <div class="actions">
                <a class="link-button primary" id="directionLink" href="#" target="_blank" rel="noopener noreferrer">Get Directions</a>
            </div>
        </section>

        <section class="list hidden" id="resultList"></section>
    </main>

    <script>
        const searchInput = document.getElementById("search");
        const searchButton = document.getElementById("searchButton");
        const statusBox = document.getElementById("status");
        const resultCard = document.getElementById("resultCard");
        const resultList = document.getElementById("resultList");
        const serviceNo = document.getElementById("serviceNo");
        const coords = document.getElementById("coords");
        const directionLink = document.getElementById("directionLink");

        function getDirectionsUrl(latitude, longitude) {
            return `https://www.google.com/maps/dir/?api=1&destination=${latitude},${longitude}`;
        }

        function renderPrimaryResult(item) {
            serviceNo.textContent = `Service No: ${item.service_no}`;
            coords.textContent = `Latitude: ${item.latitude} | Longitude: ${item.longitude}`;
            directionLink.href = getDirectionsUrl(item.latitude, item.longitude);
            resultCard.classList.remove("hidden");
        }

        function renderList(items, query) {
            if (items.length <= 1) {
                resultList.classList.add("hidden");
                resultList.innerHTML = "";
                return;
            }

            resultList.innerHTML = items.map((item) => `
                <div class="list-item">
                    <strong>Service No: ${item.service_no}</strong>
                    <div>Latitude: ${item.latitude} | Longitude: ${item.longitude}</div>
                    <button class="secondary" type="button" onclick="selectService('${item.service_no}', '${item.latitude}', '${item.longitude}')">
                        ${item.service_no === query ? "Use this exact match" : "Use this location"}
                    </button>
                </div>
            `).join("");
            resultList.classList.remove("hidden");
        }

        function selectService(serviceNumber, latitude, longitude) {
            renderPrimaryResult({
                service_no: serviceNumber,
                latitude,
                longitude
            });
            statusBox.textContent = `Showing location for service ${serviceNumber}.`;
            resultCard.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }

        async function findService() {
            const query = searchInput.value.trim();

            resultCard.classList.add("hidden");
            resultList.classList.add("hidden");
            resultList.innerHTML = "";

            if (!query) {
                statusBox.textContent = "Please enter a service number.";
                return;
            }

            statusBox.textContent = "Searching service data...";

            try {
                const response = await fetch(`/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();

                if (!response.ok) {
                    statusBox.textContent = data.error || "Unable to search right now.";
                    return;
                }

                if (!data.length) {
                    statusBox.textContent = "No service found for that number.";
                    return;
                }

                const exactMatch = data.find((item) => item.service_no === query);

                if (exactMatch) {
                    renderPrimaryResult(exactMatch);
                    renderList(data, query);
                    statusBox.textContent = `Found an exact match${data.length > 1 ? ` and ${data.length - 1} similar service${data.length - 1 > 1 ? "s" : ""}` : ""}.`;
                    return;
                }

                if (data.length === 1) {
                    renderPrimaryResult(data[0]);
                    renderList(data, query);
                    statusBox.textContent = "Found 1 matching service.";
                    return;
                }

                statusBox.textContent = `Found ${data.length} similar services. Please choose the correct one below.`;
                renderList(data, query);
            } catch (error) {
                statusBox.textContent = "The app could not connect to the backend. Please make sure Flask is running.";
            }
        }

        searchButton.addEventListener("click", findService);
        searchInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                findService();
            }
        });
    </script>
</body>
</html>
